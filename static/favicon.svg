<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%" fill="none">
  <!-- Definitions for gradients and drop shadows to add premium visual depth -->
  <defs>
    <!-- Matte black subtle gradient for depth -->
    <linearGradient id="matteBlackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E1E1E" />
      <stop offset="100%" stop-color="#0A0A0A" />
    </linearGradient>

   <!-- Vibrant high-contrast athletic red gradient -->
<linearGradient id="dynamicRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#FF1E27" />
  <stop offset="100%" stop-color="#C4001A" />
</linearGradient>

<!-- Subtle drop shadow to give the overlapping tracks an interactive 3D layer feel -->
<filter id="subtleShadow" x="-10%" y="-10%" width="130%" height="130%" filterUnits="userSpaceOnUse">
  <feDropShadow dx="-2" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.18" />
</filter>

  </defs>

  <!-- Main Monogram Group with a dynamic 12-degree athletic slant -->
  <g transform="translate(256, 256) skewX(-12) translate(-256, -256)">
    
    <!-- 1. The Matte Black 'P' Stem & Lower Loop Base -->
<!-- This represents the solid, structured pillar of "Set-Point" (Strength) -->
<path 
  d="M 180,100 
     L 230,100 
     A 90,90 0 0,1 320,190 
     A 90,90 0 0,1 230,280 
     L 230,420 
     L 180,420 
     Z" 
  fill="url(#matteBlackGrad)" 
  stroke="#121212"
  stroke-width="2"
  stroke-linejoin="round"
/>

<!-- Inner knockout for the P loop to keep it clean and readable -->
<path 
  d="M 230,150 
     A 40,40 0 0,1 270,190 
     A 40,40 0 0,1 230,230 
     L 230,150 
     Z" 
  fill="#FFFFFF" 
/>

<!-- 2. The Interlocking Dynamic Red 'S' Track -->
<!-- This represents the energetic, continuous fluid motion of tracking sessions (Cardio/Agility) -->
<!-- It wraps physically under the top curve of P and sweeps over the bottom stem -->
<path 
  d="M 330,100 
     C 280,100 240,125 210,160
     C 195,178 180,205 180,230
     C 180,270 215,290 250,305
     C 290,320 330,335 330,375
     C 330,410 300,430 260,430
     C 210,430 170,400 150,370
     L 110,400
     C 140,445 195,480 260,480
     C 335,480 385,435 385,375
     C 385,325 345,305 310,290
     C 270,275 235,260 235,230
     C 235,205 255,185 290,185
     C 330,185 360,205 375,230
     L 415,200
     C 395,160 370,120 330,100 
     Z" 
  fill="url(#dynamicRedGrad)" 
  filter="url(#subtleShadow)"
/>

<!-- 3. Interlocking Overlap Overlay (Gives the weaving depth) -->
<!-- Re-drawing the top-right section of the P-loop over the S to lock them together -->
<path 
  d="M 230,100 
     A 90,90 0 0,1 320,190 
     L 285,190
     A 55,55 0 0,0 230,135
     Z" 
  fill="url(#matteBlackGrad)" 
/>



  </g>
</svg>